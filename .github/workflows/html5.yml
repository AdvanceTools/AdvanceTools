name: Build AdvanceTools (HTML5)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-html5:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # SETUP HAXE
      # =========================
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      # =========================
      # INSTALL LIBRARIES
      # =========================
      - name: Install dependencies
        run: |
          haxelib install lime
          haxelib install openfl

      # =========================
      # SETUP LIME
      # =========================
      - name: Setup Lime
        run: |
          haxelib run lime setup

      # =========================
      # BUILD PROJECT
      # =========================
      - name: Build HTML5
        run: |
          haxelib run lime build html5 -release

      # =========================
      # UPLOAD ARTIFACT
      # =========================
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: html5-build
          path: export/html5/bin

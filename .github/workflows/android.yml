name: Build AdvanceTools (Signed APK)

on:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # JAVA 17
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # BUILD TOOLS
      # =========================
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget unzip

      # =========================
      # ANDROID SDK
      # =========================
      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip tools.zip

          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK=$HOME/android-sdk" >> $GITHUB_ENV

          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      # =========================
      # INSTALL SDK + NDK
      # =========================
      - name: Install SDK
        run: |
          yes | sdkmanager --licenses

          sdkmanager "platform-tools" \
                     "platforms;android-33" \
                     "build-tools;33.0.2" \
                     "ndk;25.1.8937393"

          echo "ANDROID_NDK_ROOT=$HOME/android-sdk/ndk/25.1.8937393" >> $GITHUB_ENV

      # =========================
      # HAXE
      # =========================
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      # =========================
      # LIBS
      # =========================
      - name: Install Haxe libs
        run: |
          haxelib install lime
          haxelib install openfl
          haxelib install hxcpp

      # =========================
      # LIME
      # =========================
      - name: Setup Lime
        run: |
          haxelib run lime setup android

      # =========================
      # BUILD APK
      # =========================
      - name: Build APK
        run: |
          haxelib run lime build android -release

      # =========================
      # DECODE KEYSTORE